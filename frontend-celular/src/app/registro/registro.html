<div class="register">
  <div class="contenido">
    <h2>Crear Cuenta</h2>

      <div class="form-group">
        <label for="usuario" class="form-label">Nombre de Usuario</label>
        <input
          type="text"
          class="form-control"
          id="usuario"
          name="usuario"
          [(ngModel)]="usuario.nombreUsuario"
          placeholder="Ej: DanRT"
          required>
      </div>

      <div class="form-group">
        <label for="correo" class="form-label">Correo Electrónico</label>
        <input
          type="email"
          class="form-control"
          id="correo"
          name="correo"
          [(ngModel)]="usuario.correo"
          placeholder="Ej: ejemplo@danrt.com"
          required>
      </div>

    <div class="form-group">
      <label for="correo" class="form-label">Confirme su Correo Electrónico</label>
      <input
        type="email"
        class="form-control"
        id="correo"
        name="correo"
        [(ngModel)]="confirmarCorreo"
        placeholder="Ej: ejemplo@danrt.com"
        required>
    </div>

      <div class="form-group">
        <label for="contrasenia" class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="contrasenia"
          name="contrasenia"
          [(ngModel)]="usuario.contrasenia"
          placeholder="Ej: Jm12345@"
          required>
      </div>

      <div class="form-group">
        <label for="contrasenia" class="form-label">Confirme su Contraseña</label>
        <input
          type="password"
          class="form-control"
          id="contrasenia"
          name="contrasenia"
          [(ngModel)]="confirmarContrasenia"
          placeholder="Ej: Jm12345@"
          required>
      </div>

    <button
      type="submit"
      class="btn-crear"
      (click)="registrarse()"
      [disabled]="cargando">

      <span *ngIf="!cargando">Registrarse</span>

      <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
      <span *ngIf="cargando">Registrando...</span>

    </button>
  </div>
</div>
