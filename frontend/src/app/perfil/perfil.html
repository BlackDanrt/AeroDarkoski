<div *ngIf="cargando" class="loading-container">
  <div class="spinner-perfil"></div>
  <p class="text-muted">Cargando perfil...</p>
</div>

<div *ngIf="!cargando && mensajeError && !usuario.id" class="config-container">
  <div class="error-sesion animate__animated animate__fadeIn">
    <h3>{{ mensajeError }}</h3>
    <p>Redirigiendo al login...</p>
  </div>
</div>

<div *ngIf="!cargando && usuario.id" class="config-container">
  <div class="card-config">
    <h2 class="titulo-seccion">Configuración de Usuario</h2>

    <form (ngSubmit)="guardarCambios()">
      <div class="campo-grupo">
        <label for="nombreUsuario">Nombre de Usuario</label>
        <input
          type="text"
          id="nombreUsuario"
          name="nombreUsuario"
          [(ngModel)]="usuario.nombreUsuario"
          placeholder="Tu nombre de usuario">
      </div>

      <div class="campo-grupo">
        <label for="correo">Correo Electrónico</label>
        <input
          type="email"
          id="correo"
          name="correo"
          [(ngModel)]="usuario.correo"
          readonly>
      </div>

      <div class="campo-grupo">
        <label for="contrasenia">Nueva Contraseña (Opcional)</label>
        <input
          type="password"
          id="contrasenia"
          name="contrasenia"
          [(ngModel)]="usuario.contrasenia"
          placeholder="Mínimo 6 caracteres">
      </div>

      <div class="campo-grupo">
        <label for="confirmarContrasenia">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmarContrasenia"
          name="confirmarContrasenia"
          [(ngModel)]="confirmarContrasenia"
          placeholder="Repite la nueva contraseña">
      </div>

      <div class="acciones">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="guardando">
          <i class="bi" [class.bi-check-lg]="!guardando" [class.bi-arrow-repeat]="guardando" [class.spin]="guardando"></i>
          {{ guardando ? 'Guardando...' : 'Guardar Cambios' }}
        </button>

        <button
          type="button"
          class="btn btn-secondary"
          (click)="cancelar()"
          [disabled]="guardando">
          <i class="bi bi-x-lg me-2"></i>Cancelar
        </button>
      </div>
    </form>

  </div>
</div>
